_metadata:
  name: Observability
  description: SNMP, syslog, BMP, and gNMI for the NetClaw observability stack
  weight: 200
  is_active: true
  roles:
    - name: "Provider Router"
    - name: "Provider Edge Router"
    - name: "Provider Route Reflector"
    - name: "Customer Edge Router"
    - name: "Datacenter Spine"
    - name: "Datacenter Leaf"
observability:
  mgmt_vrf: clab-mgmt
  snmp:
    community: public
    access: ro
  syslog:
    host: 192.168.220.200
    port: 1514
    transport: udp
    trap_level: informational
  bmp:
    enabled: true
    host: 192.168.220.205
    port: 5000
    server_id: 1
    description: netclaw-gobmp
    initial_refresh_delay: 30
    initial_delay: 5
    failure_retry_delay: 5
    flapping_delay: 30
  gnmi:
    enabled: true
    transport: default
    port: 6030